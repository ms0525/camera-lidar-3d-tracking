# SPDX-License-Identifier: AGPL-3.0-only
name: Public preview CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-and-test:
    name: Audit and test (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install public preview dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt

      - name: Audit public release contents
        run: python scripts/audit_public_release.py

      - name: Test dashboard core
        run: python -m unittest discover -s tests -p "test_dashboard_core.py" -v

      - name: Smoke-test Streamlit preview
        run: python -m unittest discover -s tests -p "test_streamlit_dashboard.py" -v
